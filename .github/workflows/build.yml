name: Build Mac Swift App

on:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Swift App
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          key = os.environ.get("PEXELS_API_KEY", "")
          Path("Sources/LiveWallpaper/AppConfig.swift").write_text(
              "import Foundation\n\n"
              "enum AppConfig {\n"
              f"    static let bakedPexelsAPIKey = {json.dumps(key)}\n"
              "}\n"
          )
          PY

          swiftc \
            Sources/LiveWallpaper/main.swift \
            Sources/LiveWallpaper/AppDelegate.swift \
            Sources/LiveWallpaper/AppConfig.swift \
            Sources/LiveWallpaper/StatusBarController.swift \
            Sources/LiveWallpaper/WallpaperController.swift \
            Sources/LiveWallpaper/WallpaperWindow.swift \
            Sources/LiveWallpaper/Network/PexelsAPI.swift \
            Sources/LiveWallpaper/Network/VideoDownloader.swift \
            Sources/LiveWallpaper/Models/Video.swift \
            Sources/LiveWallpaper/Models/Category.swift \
            Sources/LiveWallpaper/Views/MainWindowController.swift \
            Sources/LiveWallpaper/Views/HomeViewController.swift \
            Sources/LiveWallpaper/Views/ExploreViewController.swift \
            Sources/LiveWallpaper/Views/LibraryViewController.swift \
            Sources/LiveWallpaper/Views/SettingsViewController.swift \
            Sources/LiveWallpaper/Views/Components/SidebarView.swift \
            Sources/LiveWallpaper/Views/Components/ImageCache.swift \
            Sources/LiveWallpaper/Views/Components/HeroView.swift \
            Sources/LiveWallpaper/Views/Components/VideoCardView.swift \
            -target x86_64-apple-macosx11.0 \
            -framework Cocoa \
            -framework AVFoundation \
            -framework AVKit \
            -o Wallflow 2>&1

      - name: Check binary exists
        run: |
          ls -la
          file Wallflow

      - name: Create .app Bundle
        run: |
          mkdir -p Wallflow.app/Contents/MacOS
          mkdir -p Wallflow.app/Contents/Resources
          mv Wallflow Wallflow.app/Contents/MacOS/
          cat > Wallflow.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Wallflow</string>
              <key>CFBundleIdentifier</key>
              <string>com.livewallpaper.app</string>
              <key>CFBundleName</key>
              <string>Wallflow</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF

      - name: Zip .app
        run: |
          zip -r Wallflow.zip Wallflow.app

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: Wallflow
          path: Wallflow.zip
